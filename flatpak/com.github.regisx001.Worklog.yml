id: com.github.regisx001.Worklog
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node20   # Needed for Bun compatibility
command: worklog    # Binary name from Tauri build

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc
  # For file access: use portals if possible, but for local project management
  # we often need direct directory browsing. Adjust as needed.
  - --filesystem=home
  # Allow access to portals for file chooser & other integrations
  - --talk-name=org.freedesktop.portal.*

modules:
  - name: worklog
    buildsystem: simple
    build-options:
      env:
        CARGO_HOME: /run/build/worklog/cargo
        XDG_CACHE_HOME: /run/build/worklog/flatpak-node/cache
        npm_config_cache: /run/build/worklog/flatpak-node/npm-cache
        npm_config_offline: 'true'
    sources:
      # Your app's source code
      - type: git
        url: https://github.com/regisx001/Worklog.git
        tag: v1.1.0   # Replace with your actual version tag, or use commit
      # Pre-generated offline dependencies
      - cargo-sources.json
      - node-sources.json
      # Bun binary (downloaded once, stored offline)
      - type: file
        url: https://github.com/oven-sh/bun/releases/download/bun-v1.0.30/bun-linux-x64.zip
        sha256: 66b040ba475bc662b4a5f5e9b66b7f5707c916bf53e171a35cb79608dccee792
        dest: bun/
    build-commands:
      # Install bun from the downloaded zip
      - unzip bun/bun-linux-x64.zip -d /app/bin
      - chmod +x /app/bin/bun
      # Set up Rust toolchain
      - source /usr/lib/sdk/rust-stable/enable.sh
      # Install JS dependencies offline
      - bun install --offline
      # Build the Tauri app (without creating .deb/.rpm)
      - bun run tauri build -- --no-bundle
      # Install binary
      - install -Dm755 src-tauri/target/release/worklog /app/bin/worklog
      # Install desktop file, metainfo, and icon
      - install -Dm644 flatpak/com.github.regisx001.Worklog.desktop /app/share/applications/com.github.regisx001.Worklog.desktop
      - install -Dm644 flatpak/com.github.regisx001.Worklog.metainfo.xml /app/share/metainfo/com.github.regisx001.Worklog.metainfo.xml
      - install -Dm644 flatpak/icons/icon-256.png /app/share/icons/hicolor/256x256/apps/com.github.regisx001.Worklog.png