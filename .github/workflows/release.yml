name: publish

on:
  push:
    tags:
      - app-v*
  workflow_dispatch:

permissions:
  contents: write

env:
  RUSTC_WRAPPER: sccache

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # Bun setup + cache
      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: cache bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('packages/worklog/bun.lock') }}

      # Rust toolchain
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: add macOS Rust targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      # sccache (major speedup)
      - name: setup sccache
        uses: mozilla-actions/sccache-action@v0.0.4

      - name: cache sccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: ${{ runner.os }}-sccache-${{ hashFiles('packages/worklog/src-tauri/Cargo.lock') }}

      # Rust cache
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./packages/worklog/src-tauri -> target

      # Linux deps
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Frontend install (now cached)
      - name: install frontend dependencies
        working-directory: packages/worklog
        run: bun install --frozen-lockfile

      # Optional: build frontend once explicitly (avoids rebuild inside tauri)
      - name: build frontend
        working-directory: packages/worklog
        run: bun run build

      # Release bundles only. Updater artifacts require a valid minisign private
      # key in TAURI_SIGNING_PRIVATE_KEY, so keep them disabled in CI unless the
      # signing secret is intentionally reintroduced.
      - name: disable updater artifacts for CI bundle
        working-directory: packages/worklog
        shell: pwsh
        run: |
          @'
          {
            "bundle": {
              "createUpdaterArtifacts": false
            }
          }
          '@ | Set-Content -Path tauri.ci.conf.json -Encoding utf8

      # Tauri build + release artifacts
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCCACHE_GHA_ENABLED: "true"
        with:
          projectPath: packages/worklog
          tagName: ${{ github.ref_name }}
          releaseName: Worklog ${{ github.ref_name }}
          releaseBody: See the assets to download this version and install.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }} --config tauri.ci.conf.json
          includeUpdaterJson: false

      - name: upload Windows portable executable
        if: matrix.platform == 'windows-latest'
        working-directory: packages/worklog
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $config = Get-Content -Raw src-tauri/tauri.conf.json | ConvertFrom-Json
          $assetName = "$($config.productName)_$($config.version)_x64_portable.exe"
          Copy-Item src-tauri/target/release/worklog.exe $assetName -Force
          gh release upload "${{ github.ref_name }}" $assetName --clobber
