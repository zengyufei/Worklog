name: publish

on:
  push:
    tags:
      - app-v*
  workflow_dispatch:

permissions:
  contents: write

env:
  RUSTC_WRAPPER: sccache

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Bun setup + cache
      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: cache bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('packages/worklog/bun.lock') }}

      # Rust toolchain
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: add macOS Rust targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      # sccache (major speedup)
      - name: setup sccache
        uses: mozilla-actions/sccache-action@v0.0.4

      - name: cache sccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: ${{ runner.os }}-sccache-${{ hashFiles('packages/worklog/src-tauri/Cargo.lock') }}

      # Rust cache (you already had this, keep it)
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./packages/worklog/src-tauri -> target

      # Linux deps
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Frontend install (now cached)
      - name: install frontend dependencies
        working-directory: packages/worklog
        run: bun install --frozen-lockfile

      # Optional: build frontend once explicitly (avoids rebuild inside tauri)
      - name: build frontend
        working-directory: packages/worklog
        run: bun run build

      # Tauri build
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCCACHE_GHA_ENABLED: "true"
        with:
          projectPath: packages/worklog
          tagName: app-v__VERSION__
          releaseName: Worklog v__VERSION__
          releaseBody: See the assets to download this version and install.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}